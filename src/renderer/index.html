<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AmNote</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    #splash {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 9999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #f5f7fa 0%, #e4e9f0 100%);
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      transition: opacity 0.4s ease;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }
    #splash .logo { width: 72px; height: 72px; background: #0078d4; border-radius: 18px;
      display: flex; align-items: center; justify-content: center; margin-bottom: 24px;
      box-shadow: 0 8px 28px rgba(0,120,212,0.35); animation: logoPulse 2s ease-in-out infinite; }
    #splash .logo svg { width: 40px; height: 40px; fill: #fff; }
    #splash .title { font-size: 28px; font-weight: 700; color: #1a1a2e; margin-bottom: 8px; }
    #splash .subtitle { font-size: 13px; color: #666; margin-bottom: 32px; max-width: 280px; text-align: center; line-height: 1.6; }
    #splash .loading-area { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    #splash .spinner {
      width: 32px; height: 32px; border: 3px solid #e0e0e0;
      border-top-color: #0078d4; border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    #splash .load-text { font-size: 13px; color: #888; min-height: 20px; transition: opacity 0.3s; }
    #splash .version { font-size: 11px; color: #bbb; margin-top: 48px; }
    @keyframes logoPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (prefers-color-scheme: dark) {
      #splash { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); }
      #splash .title { color: #e0e0e0; }
      #splash .subtitle { color: #999; }
      #splash .spinner { border-color: #333; border-top-color: #60cdff; }
      #splash .load-text { color: #777; }
      #splash .logo { background: #0078d4; box-shadow: 0 8px 28px rgba(0,120,212,0.25); }
    }
  </style>
</head>
<body>
  <div id="splash">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 2l5 5h-5V4zM8 13h8v2H8v-2zm0 4h8v2H8v-2zm0-8h3v2H8V9z"/></svg>
    </div>
    <div class="title">AmNote</div>
    <div class="subtitle">AI 驱动的个人知识管理平台</div>
    <div class="loading-area">
      <div class="spinner"></div>
      <div class="load-text" id="load-text">正在加载工作区...</div>
    </div>
    <div class="version">v1.02</div>
  </div>
  <div id="app"></div>
  <script>
    var loadTexts = ['正在加载工作区...', '正在初始化数据库...', '正在准备界面...'];
    var loadIdx = 0;
    var loadTimer = setInterval(function() {
      loadIdx++;
      if (loadIdx < loadTexts.length) {
        document.getElementById('load-text').textContent = loadTexts[loadIdx];
      } else {
        clearInterval(loadTimer);
      }
    }, 1200);
    // 由 Vue 应用在数据加载完成后调用
    window.__appReady = function() {
      clearInterval(loadTimer);
      var el = document.getElementById('splash');
      if (el) {
        document.getElementById('load-text').textContent = '就绪';
        setTimeout(function() {
          el.classList.add('hidden');
          setTimeout(function() { el.remove(); }, 500);
        }, 300);
      }
    };
    // 安全兜底：如果 8 秒后 Vue 仍未调用，强制隐藏
    setTimeout(function() { window.__appReady && window.__appReady(); }, 8000);
  </script>
  <script type="module" src="./main.ts"></script>
</body>
</html>
